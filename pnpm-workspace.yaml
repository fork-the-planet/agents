packages:
  - "examples/*"
  - "packages/*"
  - "voice-providers/*"
  - "guides/*"
  - "experimental/*"
  - "openai-sdk/*"
  - "site/*"
  - "wip/*"
  - "think-starters/*"
linkWorkspacePackages: true
preferWorkspacePackages: true
patchedDependencies:
  "@chonkiejs/chunk@0.9.3": patches/@chonkiejs+chunk+0.9.3.patch
  vitest-browser-react@2.2.0: patches/vitest-browser-react+2.2.0.patch
allowBuilds:
  "@mongodb-js/zstd": true
  autoevals: set this to true or false
  better-sqlite3: true
  core-js-pure: true
  esbuild: true
  node-liblzma: true
  nx: true
  sharp: true
  workerd: true
minimumReleaseAgeExclude:
  - "@cloudflare/*"
  - "@typescript/*"
  - "@ai-sdk/anthropic@3.0.82"
  - "@ai-sdk/gateway@3.0.127"
  - "@ai-sdk/openai@3.0.69"
  - "@ai-sdk/react@3.0.201"
  - "@astrojs/cloudflare@13.7.0"
  - "@elevenlabs/elevenlabs-js@2.52.0"
  - ai@6.0.199
  - astro@6.4.5
  - autoevals@0.3.0
  - hono@4.12.25
  - miniflare@4.20260609.0
  - workerd@1.20260609.1
  - wrangler@4.99.0
