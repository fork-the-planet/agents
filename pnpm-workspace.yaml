packages:
  - "examples/*"
  - "packages/*"
  - "voice-providers/*"
  - "guides/*"
  - "experimental/*"
  - "openai-sdk/*"
  - "site/*"
  - "wip/*"
  - "think-starters/*"
linkWorkspacePackages: true
preferWorkspacePackages: true
patchedDependencies:
  "@chonkiejs/chunk@0.9.3": patches/@chonkiejs+chunk+0.9.3.patch
  vitest-browser-react@2.2.0: patches/vitest-browser-react+2.2.0.patch
allowBuilds:
  # pi-recovery fixture deps (@earendil-works/pi-ai); the faux provider path
  # never invokes these, so their postinstall/native builds are not needed.
  "@google/genai": false
  protobufjs: false
  "@mongodb-js/zstd": true
  autoevals: set this to true or false
  better-sqlite3: true
  core-js-pure: true
  esbuild: true
  node-liblzma: true
  nx: true
  sharp: true
  workerd: true
  # Transitive dep of @cloudflare/tanstack-ai (tanstack-recovery harness). The
  # Workers AI binding path never uses the OpenRouter SDK, so its build is skipped.
  "@openrouter/sdk": false
minimumReleaseAgeExclude:
  - "@cloudflare/*"
  - "@typescript/*"
  - workerd@1.20260625.1
  - miniflare@4.20260625.0
  - wrangler@4.105.0
  - workers-ai-provider@3.2.1
  - "@shikijs/core@4.3.0"
  - "@shikijs/engine-javascript@4.3.0"
  - "@shikijs/engine-oniguruma@4.3.0"
  - "@shikijs/langs@4.3.0"
  - "@shikijs/primitive@4.3.0"
  - "@shikijs/themes@4.3.0"
  - "@shikijs/types@4.3.0"
  - "@types/node@26.0.1"
  - framer-motion@12.42.0
  - motion-dom@12.42.0
  - nanoid@5.1.16
  - postal-mime@2.7.5
  - shiki@4.3.0
